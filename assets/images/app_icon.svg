<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>

  <!-- Cloud shape -->
  <g filter="url(#shadow)">
    <path d="M764 520
             c0-80-65-145-145-145
             c-15 0-30 2-44 7
             c-30-60-92-102-165-102
             c-100 0-182 82-182 182
             c0 12 1 24 4 35
             c-55 20-94 72-94 133
             c0 78 64 142 142 142
             h460
             c78 0 142-64 142-142
             c0-58-35-108-85-130
             c10-23 17-50 17-80z"
          fill="url(#cloudGrad)"
          transform="translate(50, 50)"/>
  </g>

  <!-- Network nodes and lines -->
  <g stroke="#667eea" stroke-width="8" fill="#667eea">
    <!-- Connection lines -->
    <line x1="320" y1="550" x2="420" y2="480" stroke-opacity="0.6"/>
    <line x1="420" y1="480" x2="520" y2="520" stroke-opacity="0.6"/>
    <line x1="520" y1="520" x2="620" y2="450" stroke-opacity="0.6"/>
    <line x1="620" y1="450" x2="720" y2="500" stroke-opacity="0.6"/>
    <line x1="420" y1="480" x2="400" y2="400" stroke-opacity="0.4"/>
    <line x1="520" y1="520" x2="540" y2="420" stroke-opacity="0.4"/>
    <line x1="620" y1="450" x2="640" y2="380" stroke-opacity="0.4"/>

    <!-- Nodes -->
    <circle cx="320" cy="550" r="24" fill="#fff"/>
    <circle cx="420" cy="480" r="20" fill="#fff"/>
    <circle cx="520" cy="520" r="24" fill="#fff"/>
    <circle cx="620" cy="450" r="20" fill="#fff"/>
    <circle cx="720" cy="500" r="24" fill="#fff"/>
    <circle cx="400" cy="400" r="14" fill="#fff" fill-opacity="0.7"/>
    <circle cx="540" cy="420" r="14" fill="#fff" fill-opacity="0.7"/>
    <circle cx="640" cy="380" r="14" fill="#fff" fill-opacity="0.7"/>

    <!-- Inner dots -->
    <circle cx="320" cy="550" r="10" fill="#667eea"/>
    <circle cx="420" cy="480" r="8" fill="#764ba2"/>
    <circle cx="520" cy="520" r="10" fill="#667eea"/>
    <circle cx="620" cy="450" r="8" fill="#764ba2"/>
    <circle cx="720" cy="500" r="10" fill="#667eea"/>
  </g>

  <!-- Speed indicator (lightning bolt) -->
  <g transform="translate(540, 580)">
    <path d="M60 0 L30 50 L50 50 L20 100 L80 40 L55 40 L85 0 Z"
          fill="#fbbf24"
          stroke="#f59e0b"
          stroke-width="3"/>
  </g>
</svg>
